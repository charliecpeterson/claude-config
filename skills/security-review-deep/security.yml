name: Security Review

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    # Re-scan weekly to catch CVEs published after the code was merged
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write   # for SARIF upload to GitHub Security tab
  pull-requests: write     # for review comments

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can diff

      # --- Semgrep ---
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
        env:
          SEMGREP_OUTPUT_FORMAT: sarif
          SEMGREP_SARIF_OUTPUT: semgrep.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      # --- OSV scanner (dependency CVEs from osv.dev) ---
      - name: OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.0
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv.sarif
            ./
        continue-on-error: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: osv.sarif

      # --- Trivy filesystem + container scan ---
      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

      # --- Secrets ---
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Optional: invoke the LLM-powered review skill on the diff ---
      # This is where the Claude Code skill / MCP runs against the
      # collected scanner output to triage and explain findings.
      # Uncomment once your skill runner is set up:
      #
      # - name: AI security triage
      #   run: |
      #     claude-code run security-review \
      #       --diff "${{ github.event.pull_request.base.sha }}..${{ github.sha }}" \
      #       --findings semgrep.sarif,osv.sarif,trivy.sarif
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
